services:
  - type: web
    name: musicrate
    env: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn musicrate.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: RENDER
        value: "true"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: musicrate-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: musicrate-redis
          property: connectionString
      - key: YANDEX_MUSIC_TOKEN
        sync: false

  - type: redis
    name: musicrate-redis
    ipAllowList: []
    maxmemoryPolicy: noeviction

databases:
  - name: musicrate-db
    databaseName: musicrate
    user: musicrate
    ipAllowList: []
