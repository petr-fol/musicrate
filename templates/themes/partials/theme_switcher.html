<!-- Theme Switcher Component -->
<div x-data="{ open: false }" class="relative">
    <button
        @click="open = !open"
        @click.away="open = false"
        class="flex items-center space-x-2 text-gray-400 hover:text-accent transition-colors"
        title="Выбрать тему"
    >
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"/>
        </svg>
        <span class="hidden sm:block text-sm">{{ current_theme.name }}</span>
        <svg class="w-4 h-4" :class="{'rotate-180': open}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
    </button>

    <!-- Dropdown menu -->
    <div
        x-show="open"
        x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="opacity-0 scale-95"
        x-transition:enter-end="opacity-100 scale-100"
        x-transition:leave="transition ease-in duration-75"
        x-transition:leave-start="opacity-100 scale-100"
        x-transition:leave-end="opacity-0 scale-95"
        class="absolute right-0 mt-2 w-56 rounded-lg bg-bg-secondary border border-border-color shadow-xl z-50 overflow-hidden"
        style="display: none;"
    >
        <div class="p-2">
            <p class="text-xs text-text-muted px-3 py-2 border-b border-border-color">
                Выберите тему
            </p>
            {% for theme in available_themes %}
                <form
                    hx-post="{% url 'themes:set_theme' %}"
                    hx-swap="outerHTML"
                    hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                    class="theme-form"
                >
                    <input type="hidden" name="theme_slug" value="{{ theme.slug }}">
                    <button
                        type="submit"
                        class="w-full text-left px-3 py-2 rounded-md hover:bg-bg-card transition-colors {% if current_theme.slug == theme.slug %}bg-bg-card{% endif %}"
                    >
                        <div class="flex items-center justify-between">
                            <div class="flex items-center space-x-2">
                                <span class="w-4 h-4 rounded-full border-2" style="background-color: {{ theme.bg_primary }}; border-color: {{ theme.accent_primary }};"></span>
                                <span class="{% if current_theme.slug == theme.slug %}text-accent{% else %}text-text-primary{% endif %} font-medium">
                                    {{ theme.name }}
                                </span>
                            </div>
                            <span class="text-xs text-text-muted">
                                {% if theme.theme_type == 'dark' %}🌙 Тёмная{% else %}☀️ Светлая{% endif %}
                            </span>
                        </div>
                        {% if current_theme.slug == theme.slug %}
                            <div class="mt-1 text-xs text-accent">✓ Выбрана</div>
                        {% endif %}
                    </button>
                </form>
            {% endfor %}
        </div>
    </div>
</div>
