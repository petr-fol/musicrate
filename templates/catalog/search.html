{% extends 'base.html' %}

{% block title %}Поиск | MusicRate{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8" x-data="{ searchType: '{{ search_type|default:"all" }}' }">

    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold mb-2">Поиск</h1>
        <p class="text-gray-400">Найди релизы, артистов и пользователей</p>
    </div>

    <!-- Search form -->
    <form action="{% url 'catalog:api_search' %}" method="get" class="mb-8">
        <div class="relative">
            <input
                type="text"
                name="q"
                value="{{ query }}"
                placeholder="Введите название релиза, артиста или пользователя..."
                class="w-full bg-dark-800 border border-dark-600 rounded-2xl py-4 pl-14 pr-4 text-white placeholder-gray-500 focus:outline-none focus:border-accent focus:ring-2 focus:ring-accent/20 transition-all text-lg"
                hx-get="{% url 'catalog:api_search' %}"
                hx-trigger="keyup changed delay:500ms, search"
                hx-target="#search-results"
                hx-indicator="#loading"
                hx-include="[name='type']"
            >
            <svg class="absolute left-5 top-1/2 transform -translate-y-1/2 w-6 h-6 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>

            <!-- Loading indicator -->
            <div id="loading" class="htmx-indicator absolute right-5 top-1/2 transform -translate-y-1/2">
                <svg class="animate-spin w-6 h-6 text-accent" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </div>
        </div>
        
        <!-- Hidden field for search type -->
        <input type="hidden" name="type" x-model="searchType">
    </form>

    <!-- Tabs -->
    <div class="flex space-x-2 mb-6 border-b border-dark-600">
        <button @click="searchType = 'all'" 
                :class="searchType === 'all' ? 'bg-accent text-dark-900' : 'bg-dark-800 text-gray-400 hover:text-white'"
                class="px-4 py-2 rounded-lg font-semibold transition-colors">
            Все
        </button>
        <button @click="searchType = 'releases'" 
                :class="searchType === 'releases' ? 'bg-accent text-dark-900' : 'bg-dark-800 text-gray-400 hover:text-white'"
                class="px-4 py-2 rounded-lg font-semibold transition-colors">
            Релизы
        </button>
        <button @click="searchType = 'artists'" 
                :class="searchType === 'artists' ? 'bg-accent text-dark-900' : 'bg-dark-800 text-gray-400 hover:text-white'"
                class="px-4 py-2 rounded-lg font-semibold transition-colors">
            Артисты
        </button>
        <button @click="searchType = 'users'" 
                :class="searchType === 'users' ? 'bg-accent text-dark-900' : 'bg-dark-800 text-gray-400 hover:text-white'"
                class="px-4 py-2 rounded-lg font-semibold transition-colors">
            Пользователи
        </button>
    </div>

    <!-- Results -->
    <div id="search-results">
        {% include 'catalog/partials/search_results.html' %}
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.body.addEventListener('htmx:afterSwap', function(event) {
        if (event.detail.target.id === 'search-results') {
            window.history.replaceState({}, '', window.location.pathname + '?q={{ query|escapejs }}&type=' + document.querySelector('[name="type"]').value);
        }
    });
</script>
{% endblock %}
