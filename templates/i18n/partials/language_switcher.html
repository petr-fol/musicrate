<!-- Language Switcher Component -->
<div x-data="{ langOpen: false }" class="relative">
    <button
        @click="langOpen = !langOpen"
        @click.away="langOpen = false"
        class="flex items-center space-x-2 text-text-secondary hover:text-accent transition-colors"
        title="Выбрать язык / Select language / Тілді таңдау"
    >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"/>
        </svg>
        <span class="hidden sm:block text-sm font-medium">
            {% if current_language == 'en' %}EN{% elif current_language == 'kk' %}KK{% else %}RU{% endif %}
        </span>
        <svg class="w-4 h-4" :class="{'rotate-180': langOpen}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
    </button>

    <!-- Dropdown menu -->
    <div
        x-show="langOpen"
        x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="opacity-0 scale-95"
        x-transition:enter-end="opacity-100 scale-100"
        x-transition:leave="transition ease-in duration-75"
        x-transition:leave-start="opacity-100 scale-100"
        x-transition:leave-end="opacity-0 scale-95"
        class="absolute right-0 mt-2 w-48 rounded-lg bg-bg-secondary border border-border shadow-xl z-50 overflow-hidden"
        style="display: none;"
    >
        <div class="p-2">
            {% for lang_code, lang_name in available_languages %}
                <form method="post" action="{% url 'i18n:set_language' %}" class="language-form">
                    {% csrf_token %}
                    <input type="hidden" name="language" value="{{ lang_code }}">
                    <input type="hidden" name="next" value="{{ request.path }}">
                    <button
                        type="submit"
                        class="w-full text-left px-3 py-2 rounded-md hover:bg-bg-card transition-colors {% if current_language == lang_code %}bg-bg-card{% endif %}"
                    >
                        <div class="flex items-center justify-between">
                            <span class="{% if current_language == lang_code %}text-accent{% else %}text-text-primary{% endif %} font-medium">
                                {{ lang_name }}
                            </span>
                            {% if current_language == lang_code %}
                                <svg class="w-4 h-4 text-accent" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
                                </svg>
                            {% endif %}
                        </div>
                    </button>
                </form>
            {% endfor %}
        </div>
    </div>
</div>
